spring:
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  sql:
    init:
      mode: never

plant-data-api:
  url: http://localhost:8081
  api-key: test-api-key

plantdata:
  api:
    url: http://localhost:8081
    key: test-api-key

jwt:
  secret: test-secret-key-for-testing-purposes-must-be-at-least-256-bits-long
  expiration: 86400000
